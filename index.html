<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopBalls</title>
    <link rel="stylesheet" href="./estilo.css">
</head>
<body>
    <header class="cabecalho">

        <h1>Titulo Principal</h1>
        <nav>
            <a href="">inicio</a>
        </nav>
    </header>


    <main>
        <h2>Bolas Mikasa</h2>
        <article class="cartao">
            <div class="cartao-interno">
                <div class="cartao-frente">
                    <img src="https://images.tcdn.com.br/img/img_prod/463832/bola_de_futevolei_amarelo_com_preto_2_1_e4eecbd2982de26035184804f49f6f83.jpeg" alt="Bola de Futevolei Mikasa "class= "cartao-imagem"/>
                    <p>Bola de Futevolei da Mikasa, uma das melhores marcas de bolas.</p>
                </div>
                <div class="cartao-verso">
                    <img src="https://images.tcdn.com.br/img/img_prod/463832/bola_de_futevolei_amarelo_com_preto_2_1_e4eecbd2982de26035184804f49f6f83.jpeg" alt="Bola de Futevolei Mikasa "class= "cartao-imagem"/>
                    <p>Bola de Futevolei MIkasa = R$699,90</p>
                </div>
            </div>
        </article>

    </main>
    <footer>Loja feita por Joao Gabriel e Matheus Felipe</footer>
</body>
</html>
